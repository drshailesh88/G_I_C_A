name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run test:run

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    env:
      # Mock env vars required by Next.js build (no real secrets)
      DATABASE_URL: "postgresql://mock:mock@localhost:5432/mock"
      CLERK_SECRET_KEY: "sk_test_mock_key_for_ci_build"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_mock_key_for_ci_build"
      R2_ACCESS_KEY_ID: "mock_r2_key"
      R2_SECRET_ACCESS_KEY: "mock_r2_secret"
      R2_BUCKET_NAME: "mock-bucket"
      R2_ENDPOINT: "https://mock.r2.cloudflarestorage.com"
      R2_PUBLIC_URL: "https://mock.files.example.com"
      UPSTASH_REDIS_REST_URL: "https://mock.upstash.io"
      UPSTASH_REDIS_REST_TOKEN: "mock_redis_token"
      RESEND_API_KEY: "re_mock_key"
      RESEND_FROM_EMAIL: "noreply@example.com"
      NEXT_PUBLIC_APP_URL: "https://example.com"
      NEXT_PUBLIC_APP_NAME: "GEM India CI"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run build
